name: 'Swift Syntax Compatibility Check'

description: 'Builds and optionally tests a Swift package against multiple relevant swift-syntax versions'

inputs:
  run-tests:
    description: 'Whether to run tests (true/false)'
    required: false
    default: 'false'

  major-versions-only:
    description: 'Whether to test only against major versions (true/false)'
    required: false
    default: 'false'

  from-version:
    description: 'Check starting from this swift-syntax version (e.g. 510.0.0 or 604.0.0-prerelease-2026-03-31); empty means all selected versions'
    required: false
    default: ''

  verbose:
    description: 'Whether to use verbose output for Swift commands (true/false)'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Run Swift Syntax Compatibility Check Script
      shell: bash
      run: |
        args=()
        if [ "${{ inputs.run-tests }}" = "true" ]; then
          args+=(--run-tests)
        fi
        if [ "${{ inputs.major-versions-only }}" = "true" ]; then
          args+=(--major-versions-only)
        fi
        from_version="${{ inputs.from-version }}"
        if [ -n "$from_version" ]; then
          args+=(--from-version "$from_version")
        fi
        if [ "${{ inputs.verbose }}" = "true" ]; then
          args+=(--verbose)
        fi

        bash "${{ github.action_path }}/swift-syntax-compatibility-check.sh" "${args[@]}"

branding:
  icon: 'check-circle'
  color: 'green'
